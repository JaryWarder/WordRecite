server:
  port: 8080

spring:
  config:
    import: optional:classpath:application-local.yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/bs_project?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  
  mail:
    host: smtp.qq.com
    port: 465 # 💡 显式指定 465 端口
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          timeout: 25000
          ssl:
            enable: true # 💡 必须开启 SSL
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
            port: 465

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:PLEASE_SET_JWT_SECRET_AT_LEAST_32_CHARS_LONG_FOR_LOCAL_DEV_ONLY_0123456789}
  expiration: 86400000 # 24 hours in ms

ai:
  api-key: ${API_KEY}
  api-url: ${API_URL}
